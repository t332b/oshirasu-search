name: Scrape Shirasu Videos

on:
  schedule:
    # 毎月1日と15日 JST 09:00 (UTC 00:00) に実行
    - cron: "0 0 1,15 * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Run scraper
        run: python3 scraper/scrape.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "chore: update video data $(date -u '+%Y-%m-%d') [skip ci]" &&
            git push
          )
